version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/gym/data

volumes:
  postgres_data:
